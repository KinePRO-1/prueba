function toggleNotificationPanel(){const panel=$('#notificationPanel');if(!panel)return;panel.hidden=!panel.hidden;updateNotifications()}
function showShortcutHelp(){openModal('Atajos de teclado',`<div class="shortcuts-grid"><span class="shortcut-key">Esc</span><span>Cerrar modal, confirmación, búsqueda o menú</span><span class="shortcut-key">Ctrl / Cmd + S</span><span>Guardar el formulario abierto</span><span class="shortcut-key">Ctrl / Cmd + N</span><span>Crear un registro en la vista activa</span><span class="shortcut-key">Ctrl / Cmd + F</span><span>Enfocar la búsqueda global</span><span class="shortcut-key">1–6</span><span>Navegar entre pacientes, turnos, rutinas, evoluciones, pagos y configuración</span></div>`,`<button class="btn" data-action="close-modal">Cerrar</button>`,'wide')}

function handleKeyboardShortcuts(event){const modifier=event.ctrlKey||event.metaKey,modalOpen=$('#appModal')?.classList.contains('open'),confirmOpen=$('#confirmModal')?.classList.contains('open'),inputFocused=event.target?.matches?.('input,textarea,select,[contenteditable="true"]');if(event.key==='Escape'){if(!$('#globalSearchResults')?.hidden){closeGlobalSearch();return}if(!$('#notificationPanel')?.hidden){$('#notificationPanel').hidden=true;return}if(confirmOpen)closeConfirm();else if(modalOpen)closeModal();else closeMenu();return}if(modifier&&event.key.toLowerCase()==='s'){event.preventDefault();if(modalOpen){const save=$('#appModal [data-action^="save-"]:not([disabled])');save?.click()}return}if(modifier&&event.key.toLowerCase()==='n'){event.preventDefault();const action={pacientes:'open-anamnesis',turnos:'new-turn',rutinas:'new-routine',evoluciones:'new-evolution',pagos:'new-payment'}[ui.view];if(action)document.querySelector(`[data-action="${action}"]`)?.click();return}if(modifier&&event.key.toLowerCase()==='f'){event.preventDefault();$('#globalSearch')?.focus();return}if(!modifier&&!modalOpen&&!confirmOpen&&!inputFocused&&/^[1-6]$/.test(event.key)){const view={1:'pacientes',2:'turnos',3:'rutinas',4:'evoluciones',5:'pagos',6:'configuracion'}[event.key];if(view)setView(view)}if(event.target?.id==='globalSearch'&&!$('#globalSearchResults')?.hidden){if(event.key==='ArrowDown'||event.key==='ArrowUp'){event.preventDefault();globalSearchActiveIndex=(globalSearchActiveIndex+(event.key==='ArrowDown'?1:-1)+globalSearchItems.length)%globalSearchItems.length;$$('.search-result-item').forEach((item,index)=>item.classList.toggle('active',index===globalSearchActiveIndex))}else if(event.key==='Enter'&&globalSearchItems[globalSearchActiveIndex]){event.preventDefault();activateGlobalSearchResult(globalSearchItems[globalSearchActiveIndex])}}}

const legacyHandleAppClickV2=handleAppClick;
handleAppClick=async function(event){const target=event.target.closest('[data-action],[data-view],[data-goto]');if(!target)return;const action=target.dataset.action;if(action==='toggle-theme'){toggleTheme();return}if(action==='sign-out'){await firebaseApi.signOut(auth);return}if(action==='show-shortcuts'){showShortcutHelp();return}if(action==='show-alerts'){toggleNotificationPanel();return}if(action==='global-result'){activateGlobalSearchResult(globalSearchItems[Number(target.dataset.index)]);return}if(action==='load-more-patients'){ui.patientPage++;renderPacientes();return}if(action==='load-more-payments'){ui.paymentPage++;renderPagos();return}if(action==='load-more-evolutions'){ui.evolutionPage++;renderEvoluciones();return}if(action==='turnos-mode'){ui.turnosMode=target.dataset.tab==='week'?'week':'list';renderTurnos();return}if(action==='turn-week-prev'){ui.turnosWeekOffset--;renderTurnos();return}if(action==='turn-week-next'){ui.turnosWeekOffset++;renderTurnos();return}if(action==='new-turn-date'){openTurnForm('',{fecha:target.dataset.date});return}if(action==='export-patient-pdf'){printPatient(target.dataset.id);return}return legacyHandleAppClickV2(event)};
const legacyHandleAppInputV2=handleAppInput;
handleAppInput=function(event){if(event.target.name==='dni'){event.target.value=normalizeDni(event.target.value).slice(0,8)}if(event.target.id==='patientSearch')ui.patientPage=1;legacyHandleAppInputV2(event)};
const legacyHandleAppChangeV2=handleAppChange;
handleAppChange=function(event){if(['patientStateFilter','patientTreatmentFilter','patientSort'].includes(event.target.id))ui.patientPage=1;if(['paymentPeriodFilter','paymentFromFilter','paymentToFilter'].includes(event.target.id))ui.paymentPage=1;legacyHandleAppChangeV2(event)};
handleDeferredFocusout=function(event){if(event?.target?.name==='dni')validateDniInput(event.target);setTimeout(flushDeferredRemoteRender,0)};
handleContextOutsideClick=function(event){const current=event.target.closest('details.context');$$('details.context[open]').forEach(detail=>{if(detail!==current)detail.removeAttribute('open')});if(!event.target.closest('.search'))closeGlobalSearch();if(!event.target.closest('.notification-wrap')){const panel=$('#notificationPanel');if(panel)panel.hidden=true}};
handleAfterPrint=function(){setElementHtml($('#printArea'),'');if(previousDocumentTitle){document.title=previousDocumentTitle;previousDocumentTitle=''}};
attachListeners=function(){if(listenersAttached)return;listenersAttached=true;document.addEventListener('click',handleAppClick);document.addEventListener('click',handleContextOutsideClick);document.addEventListener('input',handleAppInput);document.addEventListener('change',handleAppChange);document.addEventListener('toggle',handlePatientDetailsToggle,true);document.addEventListener('focusout',handleDeferredFocusout,true);document.addEventListener('keydown',handleKeyboardShortcuts);document.addEventListener('dragstart',handleDraftDragStart);document.addEventListener('dragover',handleDraftDragOver);document.addEventListener('drop',handleDraftDrop);document.addEventListener('dragend',handleDraftDragEnd);window.addEventListener('afterprint',handleAfterPrint);window.addEventListener('resize',()=>{if($('#evaChart'))drawEvaChart(ui.selectedPatientId)});$('#confirmActionButton')?.addEventListener('click',handleConfirmAction);$('#modalOverlay')?.addEventListener('click',handleModalOverlay);$('#menuBtn')?.addEventListener('click',openMenu);$('#mobileOverlay')?.addEventListener('click',closeMenu);$('#globalSearch')?.addEventListener('input',handleGlobalSearch);clearInterval(syncRelativeTimer);syncRelativeTimer=setInterval(updateSyncRelative,30000)};

/* ═══════════════════════════════════════════
   SECCIÓN 18: EXPORTACIÓN CLÍNICA E IMPRESIÓN
   ═══════════════════════════════════════════ */
printPatient=function(id){const patient=getPatient(id),stats=patientStats(id);if(!patient)return toast('Paciente no encontrado','warn');const evolutions=[...(patient.evoluciones||[])].sort((a,b)=>evolutionTime(b)-evolutionTime(a)).slice(0,5),routines=stats.routines.filter(routine=>routine.status!=='Borrador'),payments=(data.payments||[]).filter(payment=>payment.patientId===id&&payment.status==='Cobrado'),turns=(data.turns||[]).filter(turn=>turn.patientId===id),paid=payments.reduce((sum,payment)=>sum+Number(payment.amount||0),0);setElementHtml($('#printArea'),`<div class="print-sheet"><h1>ETER KinePro</h1><p>Historia clínica integral</p><div class="print-meta"><div><strong>Paciente:</strong> ${esc(patient.nombre)}</div><div><strong>DNI:</strong> ${esc(patient.dni||'—')}</div><div><strong>Edad:</strong> ${esc(patient.edad||'—')}</div><div><strong>Teléfono:</strong> ${esc(patient.telefono||'—')}</div><div><strong>Email:</strong> ${esc(patient.email||'—')}</div><div><strong>Diagnóstico:</strong> ${esc(patient.diagnostico||'—')}</div></div><h2>Resumen</h2><div class="print-kpis"><div><strong>${turns.length}</strong><span>Turnos</span></div><div><strong>${stats.history.length}</strong><span>Sesiones</span></div><div><strong>${evolutions.length}</strong><span>Evoluciones recientes</span></div><div><strong>${fmtMoney(paid)}</strong><span>Pagos cobrados</span></div></div><h2>Últimas evoluciones</h2>${evolutions.map(evolution=>`<article class="print-evolution"><strong>${esc(evolutionDateLabel(evolution))} · EVA reposo ${Number(evolution.evaReposo||0)}</strong><p>${esc(evolution.observaciones||'Sin observaciones')}</p>${evolution.planAplicado?`<p><strong>Plan:</strong> ${esc(evolution.planAplicado)}</p>`:''}</article>`).join('')||'<p>Sin evoluciones registradas.</p>'}<h2>Rutinas activas</h2>${routines.map(routine=>`<section class="print-routine-block"><strong>${esc(routine.name||'Rutina')}</strong><p>${esc(routine.objective||'Sin objetivo definido')}</p><ul>${(routine.exercises||[]).map(exercise=>`<li>${esc(exercise.name)} · ${esc(exercise.sets||0)} series · ${esc(exercise.reps||0)} repeticiones</li>`).join('')}</ul></section>`).join('')||'<p>Sin rutinas activas.</p>'}<div class="print-note"><strong>Profesional:</strong> ${esc(data.meta.professionalName||currentUser?.displayName||currentUser?.email||'Profesional')}</div></div>`);previousDocumentTitle=document.title;document.title=`Historia clínica - ${patient.nombre}`;window.print()};

exportCsv=function(){let url='';try{const rows=[['Fecha','Paciente','Rutina','Duración','Progreso','Volumen','Estado'],...data.history.map(item=>[item.finishedAt,getPatient(item.patientId)?.nombre||item.patientName||'Paciente eliminado',item.routineName,item.duration,item.progress,item.volume,item.status])],csv=rows.map(row=>row.map(value=>`"${String(value??'').replace(/"/g,'""')}"`).join(',')).join('\n'),link=document.createElement('a');url=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));link.href=url;link.download=`eter-reporte-${todayISO()}.csv`;document.body.appendChild(link);link.click();link.remove()}catch(error){console.error('CSV export failed',error);toast('No se pudo exportar el CSV','error')}finally{if(url)setTimeout(()=>URL.revokeObjectURL(url),1000)}};


window.addEventListener('beforeunload',()=>{const leader=readLeader();if(leader?.tabId===TAB_ID)localStorage.removeItem(userLeaderKey())});

async function init(){if(appInitialized)return;appInitialized=true;ensureRuntimeStyles();applyStoredTheme();attachListeners();attachAuthListeners();await initAuth()}
init().catch(error=>{console.error('ETER init failed',error);toast('La aplicación inició en modo local','warn')});
</script>
