function renderEvoluciones(){const list=allEvolutions();const patientsWithEvolutions=new Set(list.map(item=>item.patientId).filter(Boolean)).size;const now=new Date();const monthCount=list.filter(item=>{if(!item?.fecha)return false;const raw=String(item.fecha);const date=new Date(/^\d{4}-\d{2}-\d{2}$/.test(raw)?`${raw}T12:00:00`:raw);return!Number.isNaN(date.getTime())&&date.getMonth()===now.getMonth()&&date.getFullYear()===now.getFullYear()}).length;setElementHtml($('#view-evoluciones'),`<section class="evolutions-page"><div class="evolutions-page-header"><div class="evolutions-heading"><h2>Evoluciones clínicas</h2><p>Seguimiento integrado por paciente</p></div><button type="button" class="btn btn-primary evolution-create-btn" data-action="new-evolution"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg><span>Registrar evolución</span></button></div><div class="evolution-metrics"><article class="evolution-metric-card metric-total"><span class="evolution-metric-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3h12a2 2 0 0 1 2 2v16H4V5a2 2 0 0 1 2-2Z"></path><path d="M8 8h8M8 12h8M8 16h5"></path></svg></span><div class="evolution-metric-copy"><strong>${list.length}</strong><span class="evolution-metric-label">Evoluciones</span><small>registradas</small></div></article><article class="evolution-metric-card metric-patients"><span class="evolution-metric-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="m16 11 2 2 4-4"></path></svg></span><div class="evolution-metric-copy"><strong>${patientsWithEvolutions}</strong><span class="evolu function openEvolutionForm(patientId='',evolutionId=''){const patient=patientId?getPatient(patientId):null;const evo=patient?.evoluciones?.find(e=>e.id===evolutionId)||{};openModal(evolutionId?'Editar evolución':'Registrar evolución',`<form id="evolutionForm" class="form-grid"><input type="hidden" name="id" value="${esc(evo.id||'')}"><div class="field full"><label>Paciente *</label><select class="select" name="patientId" required>${data.patients.map(p=>`<option value="${p.id}" ${p.id===(patientId||evo.patientId)?'selected':''}>${esc(p.nombre)}</option>`).join('')}</select></div><div class="field"><label>Fecha *</label><input class="input" name="fecha" type="date" required value="${esc(evo.fecha||todayISO())}"></div><div class="field"><label>Plan aplicado</label><input class="input" name="planAplicado" value="${esc(evo.planAplicado||'')}"></div><div class="field"><label>EVA en actividad</label><input class="input" name="evaActividad" type="number" min="0" max="10" value="${Number(evo.evaActividad||0)}"></div><div class="field"><label>EVA en reposo</label><input class="input" name="evaReposo" type="number" min="0" max="10" value="${Number(evo.evaReposo||0)}"></div><div class="field full"><label>Observaciones</label><textarea class="textarea" name="observaciones">${esc(evo.observaciones||'')}</textarea></div></form>`,`<button class="btn" data-action="close-modal">Cancelar</button><button class="btn btn-primary" data-action="save-evolution">Guardar evolución</button>`,'wide')}

function renderRoutineList(){
  const currentSearch=String(ui.routineSearch||'');
  const normalize=value=>normalizedPatientName(value||'');
  const filterRoutines=query=>{
    const term=normalize(query);
    return data.routines.filter(r=>{
      if(!term)return true;
      const patient=getPatient(r.patientId);
      const haystack=normalize(`${r.name||''} ${patient?.nombre||r.patientName||''} ${r.objective||''}`);
      return haystack.includes(term)
    })
  };
  const groupHtml=list=>{
    const groups=new Map();
    list.forEach(r=>{
      const patient=getPatient(r.patientId);
      const patientName=r.template?'Plantillas':(patient?.nombre||r.patientName||'Sin paciente');

function filteredHistory(){
  const f=ui.historyFilters||{};
  const patientQuery=normalizedPatientName(f.patientQuery||'');
  const routineQuery=normalizedPatientName(f.routineQuery||'');
  const selectedDate=String(f.date||'');
  return data.history.filter(item=>{
    const patientName=normalizedPatientName(livePatientName(item));
    const routineName=normalizedPatientName(item.routineName||getRoutine(item.routineId)?.name||'');
    const itemDate=String(item.finishedAt||item.createdAt||'').slice(0,10);
    return(!patientQuery||patientName.includes(patientQuery))&&(!routineQuery||routineName.includes(routineQuery))&&(!selectedDate||itemDate===selectedDate)

}

function historyDateTimeInputValue(value){

  return`${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`
}

function saveHistoryEdit(){
  const form=$('#historyEditForm');
  if(!form||!form.reportValidity())return;
  const values=Object.fromEntries(new FormData(form));
  const item=data.history.find(record=>record.id===values.id);
  if(!item)return toast('Registro de historial no encontrado','warn');
  const finishedDate=new Date(values.finishedAt);
  if(Number.isNaN(finishedDate.getTime()))return toast('Ingresá una fecha válida','warn');
  const duration=Math.max(0,Math.round(Number(values.durationMinutes||0))*60+Math.max(0,Math.min(59,Math.round(Number(values.durationSeconds||0)))));
  const patient=getPatient(values.patientId),routine=getRoutine(values.routineId);
  const progress=Math.max(0,Math.min(100,Math.round(Number(values.progress||0))));
  const volume=Math.max(0,Number(values.volume||0));
  const finishedAt=finishedDate.toISOString();
  const startedAt=new Date(finishedDate.getTime()-duration*1000).toISOString();
  upsertEntity('history',{...item,patientId:patient?.id||'',patientName:patient?.nombre||item.patientName||'',routineId:routine?.id||'',routineName:routine?.name||item.routineName||'Sin rutina',finishedAt,startedAt,duration,progress,volume,status:values.status||item.status||'Finalizada',notes:values.notes||''});
  closeModal();
  renderHistory();
  toast('Historial actualizado')

async function saveTurn(){
 const lockKey='save-turn';
 if(operationLocks.has(lockKey))return;
 const form=$('#turnForm');
 if(!form)return toast('El formulario del turno ya no está disponible','warn');
 const saveButton=$('#saveTurnButton');
 const saveLabel=saveButton?.querySelector('.turn-save-label');
 operationLocks.add(lockKey);
 if(saveButton){saveButton.disabled=true;saveButton.setAttribute('aria-busy','true')}
 if(saveLabel)saveLabel.textContent='Guardando…';
 try{
  if(!form.reportValidity())return;
  const values=Object.fromEntries(new FormData(form));
  const existing=data.turns.find(turn=>turn.id===values.id)||null;
  const selectedPatientId=values.patientId==='__free__'?'':values.patientId;
  const selectedPatient=getPatient(selectedPatientId);
  const freeName=String(values.pacienteLibre||'').trim();
  const matchedFree=selectedPatient?null:findPatientByName(freeName);
  const patient=selectedPatient||matchedFree;
  if(!patient&&!freeName){
   toast('Seleccioná un paciente de la lista o elegí nombre libre','error');
   const search=$('#turnPatientSearch');
   search?.focus();
   return
  }
  const billingType=values.billingType==='combo'?'combo':'individual';
  const combo=billingType==='combo'?getCombo(values.comboId):null;
  const linkedPayment=existing?getPaymentByTurn(existing.id):null;
  if(billingType==='combo'){
   if(!patient)return toast('Los packs solo pueden asignarse a pacientes con ficha','error');
   if(!combo||combo.patientId!==patient.id)return toast('Seleccioná un pack válido del paciente','error');
   if(values.fecha<combo.startDate||values.fecha>combo.endDate)return toast('La fecha del turno está fuera de la vigencia del pack','error');
   if(combo.sameMonth&&values.fecha.slice(0,7)!==combo.startDate.slice(0,7))return toast('Esta promo solo puede utilizarse dentro del mismo mes de inicio','error');
   if(comboUsage(combo,existing?.id||'').remaining<1)return toast('El pack ya no tiene sesiones disponibles','error');
   if(linkedPayment)return toast('El turno ya tiene un pago vinculado. Eliminá ese pago antes de pasarlo a un pack','error')
  }
  const rate=getPromo(values.rateId);
  const payload=normalizeTurn({
   ...existing,
   id:values.id||uid('turn'),
   patientId:patient?.id||'',
   paciente:patient?.nombre||freeName,
   hora:values.hora,
   fecha:values.fecha,
   motivo:values.motivo,
   estado:values.estado,
   price:Number(values.price||0),
   rateId:billingType==='individual'&&rate?.kind==='single'?rate.id:'',
   billingType,
   comboId:billingType==='combo'?combo.id:''
  });
  upsertEntity('turns',payload);
  const savedDate=values.fecha;
  const wasEditing=Boolean(existing);
  closeModal();
  if(ui.view==='turnos')renderTurnos(savedDate);
  else if(ui.view==='inicio')renderInicio();
  else if(ui.view==='pagos')renderPagos();
  else scheduleCurrentViewRender({force:true,reason:'turn-saved'});
  toast(wasEditing?'Turno actualizado':'Turno guardado','success')
 }catch(error){
  console.error('No se pudo guardar el turno',error);
  toast('No se pudo guardar el turno. Los datos permanecen en el formulario','error')
 }finally{
  operationLocks.delete(lockKey);
  if(saveButton&&document.contains(saveButton)){
   saveButton.disabled=false;
   saveButton.removeAttribute('aria-busy')
  }
  if(saveLabel&&document.contains(saveLabel))saveLabel.textContent='Guardar'
 }
}
function setTurnStatus(id,status){
 const allowed=['Pendiente','Confirmado','Finalizado','Cancelado'];
 if(!allowed.includes(status))return toast('Estado de turno no válido','warn');
 const turn=getTurnById(id);
 if(!turn)return toast('Turno no encontrado','warn');
 if(turn.estado===status)return;
 upsertEntity('turns',normalizeTurn({...turn,estado:status}));
 if(ui.view==='turnos')renderTurnos();
 else if(ui.view==='inicio')renderInicio();
 else scheduleCurrentViewRender({force:true,reason:'turn-status'});
 updateNotifications();
 toast(`Turno marcado como ${status}`,'success')
}
function deleteTurn(id){const turn=getTurnById(id);if(!turn)return;if(getPaymentByTurn(id))return toast('No se puede eliminar un turno que tiene un pago vinculado. Eliminá primero el pago','error');openConfirm('Eliminar turno','El turno será removido de la agenda. Si estaba incluido en un combo, la sesión volverá a quedar disponible.',async()=>{await removeEntity('turns',id);closeConfirm();renderTurnos(turn.fecha);renderInicio();renderPagos();toast('Turno eliminado','info')})}

function paymentRangeForPeriod(){
 const period=ui.paymentFilters?.period||'all',today=todayISO();

 else if(a==='edit-history')openHistoryEditor(id);else if(a==='save-history')saveHistoryEdit();else if(a==='delete-history')deleteHistoryRecord(id);
 else if(a==='routine-tab'){ui.routineTab=target.dataset.tab;renderRutinas()}else if(a==='new-routine'){if(patientId||id)handleCreateRoutineForPatient(patientId||id);else openRoutineEditor('')}else if(a==='edit-routine')openRoutineEditor('',id);else if(a==='view-routine')viewRoutine(id);else if(a==='save-routine')saveRoutine(false);else if(a==='save-routine-draft')saveRoutine(true);else if(a==='duplicate-routine')duplicateRoutine(id);else if(a==='delete-routine')deleteRoutineFlow(id);else if(a==='print-routine')printRoutine(id);else if(a==='print-patient')printPatient(id);
 else if(a==='use-library-exercise'){const ex=combinedExerciseLibrary().find(x=>x.id===id);if(ex)addExerciseToDraft(ex)}else if(a==='add-blank-exercise')addExerciseToDraft({name:'Nuevo ejercicio',category:'General',source:'Manual'});else if(a==='move-exercise'){const i=Number(target.dataset.index),j=i+Number(target.dataset.direction);if(j>=0&&j<ui.routineDraft.exercises.length){[ui.routineDraft.exercises[i],ui.routineDraft.exercises[j]]=[ui.routineDraft.exercises[j],ui.routineDraft.exercises[i]];renderExerciseDraftList();persistRoutineEditorDraft()}}else if(a==='duplicate-draft-exercise'){const i=Number(target.dataset.index);ui.routineDraft.exercises.splice(i+1,0,{...ui.routineDraft.exercises[i],id:uid('exercise')});renderExerciseDraftList();persistRoutineEditorDraft()}else if(a==='remove-draft-exercise'){ui.routineDraft.exercises.splice(Number(target.dataset.index),1);renderExerciseDraftList();persistRoutineEditorDraft()}else if(a==='new-custom-exercise')openCustomExerciseForm();else if(a==='save-custom-exercise')saveCustomExercise();else if(a==='return-routine-editor')renderRoutineEditorModal();else if(a==='delete-custom-exercise')openConfirm('Eliminar ejercicio personalizado','Se quitará de la biblioteca. Las rutinas existentes no se modificarán.',async()=>{await removeEntity('exerciseLibrary',id);closeConfirm();renderRoutineEditorModal()});
 else if(a==='start-routine'){if($('#appModal').classList.contains('open'))closeModal();startSessionByRoutine(id)}else if(a==='start-selected-session'){const selectedRoutineId=$('#sessionRoutine')?.value;if(!selectedRoutineId)return toast('Seleccioná una rutina primero','warn');startSelectedSession()}else if(a==='start-patient-session')handleStartPatientSession(patientId||id);else if(a==='continue-session'){ui.routineTab='execution';setView('rutinas')}else if(a==='go-execution'){if(!(data.activeSessions||[]).length){ui.routineTab='routines';setView('rutinas');toast('Elegí una rutina y tocá Iniciar','info')}else{ui.routineTab='execution';setView('rutinas')}}else if(a==='toggle-pause')togglePause(id);else if(a==='toggle-exercise')toggleExercise(target.dataset.sessionId,target.dataset.exerciseId);else if(a==='finish-session')openConfirm('Finalizar sesión','Se guardará el resultado real en el historial.',async()=>{if(await finalizeSession(id))closeConfirm()},'Finalizar');else if(a==='abandon-session')openConfirm('Marcar como abandonada','La sesión se conservará en el historial con estado abandonado.',async()=>{if(await finalizeSession(id,'Abandonada'))closeConfirm()},'Abandonar');
 else if(a==='turn-period'){const period=target.dataset.period;if(!['day','week','month'].includes(period))return;ui.turnFilters.period=period;renderTurnos()}else if(a==='new-turn')openTurnForm('',patientId?{patientId}:{});else if(a==='set-turn-status')setTurnStatus(id,target.dataset.status);else if(a==='new-turn-promo'){const promo=getPromo(promoId);openTurnForm('',promo?{patientId:patientId||'',rateId:promo.id,motivo:promo.service,price:promo.price}:{})}else if(a==='edit-turn')openTurnForm(id);else if(a==='save-turn')saveTurn();else if(a==='delete-turn')deleteTurn(id);else if(a==='create-patient-from-turn'){const turn=getTurnById(id);if(turn)startAnamnesis('',{nombre:turn.paciente||''})}else if(a==='pay-turn')openPaymentForm({turnId:id});else if(a==='payment-tab'){const tab=target.dataset.tab;if(!['movements','packs'].includes(tab))return;ui.paymentTab=tab;renderPagos()}else if(a==='new-payment')openPaymentForm({patientId:patientId||''});else if(a==='edit-payment')openPaymentForm({paymentId:id});else if(a==='save-payment')savePayment();else if(a==='delete-payment')deletePayment(id);else if(a==='new-combo')openComboForm('',patientId||'');else if(a==='new-combo-promo')openComboForm('',patientId||'',promoId||'');else if(a==='edit-combo')openComboForm(id);else if(a==='save-combo')saveCombo();else if(a==='delete-combo')deleteCombo(id);else if(a==='pay-combo')openPaymentForm({comboId:id});else if(a==='export-csv')exportCsv();else if(a==='save-settings')saveSettings();else if(a==='force-sync'){Object.values(ENTITY_COLLECTIONS).forEach(cfg=>(data[cfg.key]||[]).forEach(item=>item._dirty=true));scheduleCloudWrite(20)}else if(a==='reset-payment-filters'){ui.paymentFilters={period:'all',method:'all',from:'',to:''};renderPagos();toast('Filtros de ingresos restablecidos','info')}else if(a){console.warn('Unhandled action',{action:a,id});toast('Esta acción no está disponible','warn')}
 if(target.closest('details.context'))queueMicrotask(()=>target.closest('details.context')?.removeAttribute('open'))
}
function handlePatientDetailsToggle(event){const card=event.target;if(!(card instanceof HTMLDetailsElement))return;if(card.classList.contains('context')){const summary=card.querySelector(':scope > summary');if(summary)summary.setAttribute('aria-expanded',String(card.open));return}if(!card.classList.contains('patient-card'))return;const id=card.dataset.patientCardId;if(!id)return;if(card.open)ui.expandedPatientIds.add(id);else ui.expandedPatientIds.delete(id)}
function handleAppInput(e){const el=e.target;if(ui.view==='pacientes'&&ui.patientTab==='anamnesis')syncAnamnesisDraftField(el);if(el.dataset.executionField)updateExecutionField(el.dataset.sessionId,el.dataset.exerciseId,el.dataset.executionField,el.value);if(el.id==='patientSearch'){ui.patientSearch=el.value;debounce('patient-search',()=>renderPacientes(),180)}if(el.dataset.historyFilter){const key=el.dataset.historyFilter;if(!['patientQuery','routineQuery','date'].includes(key))return;ui.historyFilters[key]=el.value;debounce('history-filter',()=>{if(ui.view==='rutinas'&&ui.routineTab==='history')renderHistory()},180)}}
function handleAppChange(e){
 const el=e.target;
 if(ui.view==='pacientes'&&ui.patientTab==='anamnesis')syncAnamnesisDraftField(el);
 if(el.id==='patientStateFilter'){ui.patientStateFilter=el.value;renderPacientes()}
 else if(el.id==='patientTreatmentFilter'){ui.patientTreatmentFilter=el.value;renderPacientes()}
 else if(el.id==='patientSort'){ui.patientSort=el.value;renderPacientes()}
 else if(el.dataset.historyFilter){const key=el.dataset.historyFilter;if(['patientQuery','routineQuery','date'].includes(key)){ui.historyFilters[key]=el.value;if(ui.view==='rutinas'&&ui.routineTab==='history')renderHistory()}}
 else if(el.id==='turnosDate'){ui.turnFilters.anchor=el.value||todayISO();renderTurnos()}
 else if(el.id==='paymentPeriodFilter'){
  ui.paymentFilters.period=el.value;
  if(el.value==='custom'&&(!ui.paymentFilters.from||!ui.paymentFilters.to)){ui.paymentFilters.from=`${todayISO().slice(0,7)}-01`;ui.paymentFilters.to=todayISO()}
  renderPagos()
 }
 else if(el.id==='paymentMethodFilter'){ui.paymentFilters.method=el.value||'all';renderPagos()}
 else if(el.id==='paymentFromFilter'||el.id==='paymentToFilter'){
  const key=el.id==='paymentFromFilter'?'from':'to';
  ui.paymentFilters[key]=el.value;
  ui.paymentFilters.period='custom';
  if(ui.paymentFilters.from&&ui.paymentFilters.to&&ui.paymentFilters.from>ui.paymentFilters.to){toast('La fecha desde no puede ser posterior a la fecha hasta','warn');return}
  renderPagos()
 }
}
function handleDeferredFocusout(){setTimeout(flushDeferredRemoteRender,0)}
function handleGlobalSearch(event){
 const value=event.target.value;
 debounce('global-search',()=>{
  const q=value.trim().toLowerCase();
  if(q.length<2)return;
  const patient=data.patients.find(p=>[p.nombre,p.dni,p.diagnostico].some(v=>String(v||'').toLowerCase().includes(q)));
  if(patient){ui.patientTab='list';ui.patientSearch=value.trim();setView('pacientes');return}
  const turn=data.turns.find(t=>[livePatientName(t),t.motivo,t.fecha].some(v=>String(v||'').toLowerCase().includes(q)));
  if(turn){setView('turnos');return}
  const evolution=allEvolutions().find(x=>[x.patientName,x.observaciones,x.planAplicado].some(v=>String(v||'').toLowerCase().includes(q)));
  if(evolution){setView('evoluciones');return}
  const routine=data.routines.find(r=>[r.name,livePatientName(r),r.objective].some(v=>String(v||'').toLowerCase().includes(q)));
  if(routine){ui.routineTab='routines';setView('rutinas');return}
  toast('No se encontraron coincidencias','info')
 },220)
}
function handleEscapeKey(event){if(event.key!=='Escape')return;if($('#confirmModal')?.classList.contains('open'))closeConfirm();else if($('#appModal')?.classList.contains('open'))closeModal();else closeMenu()}
async function handleConfirmAction(){
 const button=$('#confirmActionButton'),action=pendingConfirm;
 if(!button||typeof action!=='function'||button.disabled)return;
 pendingConfirm=null;
 button.disabled=true;
 try{await action()}
 catch(error){console.error('Confirm action failed',error);if($('#confirmModal')?.classList.contains('open'))pendingConfirm=action;toast('No se pudo completar la acción. Podés reintentar sin perder los datos','error')}
 finally{if(document.contains(button))button.disabled=false}
}
function handleAppSubmit(event){
 const form=event.target;
 if(!(form instanceof HTMLFormElement))return;
 if(form.id==='turnForm'){
  event.preventDefault();
  saveTurn()
 }
}
function handleModalOverlay(){if($('#confirmModal')?.classList.contains('open'))closeConfirm();else closeModal()}
function handleContextOutsideClick(event){const current=event.target.closest('details.context');$$('details.context[open]').forEach(detail=>{if(detail!==current)detail.removeAttribute('open')})}
function handleAfterPrint(){setElementHtml($('#printArea'),'')}
function attachListeners(){
 if(listenersAttached)return;
 listenersAttached=true;
 document.addEventListener('click',handleAppClick);
 document.addEventListener('click',handleContextOutsideClick);
 document.addEventListener('input',handleAppInput);
 document.addEventListener('change',handleAppChange);
 document.addEventListener('submit',handleAppSubmit);
 document.addEventListener('toggle',handlePatientDetailsToggle,true);
 document.addEventListener('focusout',handleDeferredFocusout,true);
 document.addEventListener('keydown',handleEscapeKey);
 window.addEventListener('afterprint',handleAfterPrint);
 $('#confirmActionButton')?.addEventListener('click',handleConfirmAction);
 $('#modalOverlay')?.addEventListener('click',handleModalOverlay);
 $('#menuBtn')?.addEventListener('click',toggleSidebar);
 $('#sidebarCollapseBtn')?.addEventListener('click',toggleSidebar);
 window.addEventListener('resize',()=>debounce('sidebar-viewport',restoreSidebarPreference,120));
 $('#mobileOverlay')?.addEventListener('click',closeMenu);
 $('#globalSearch')?.addEventListener('input',handleGlobalSearch)
}

function renderAll(){renderCurrentView({preserveState:true});updateNotifications()}
function updateNotifications(){const count=data.activeSessions.filter(s=>Date.now()-new Date(s.updatedAt||s.startedAt).getTime()>ABANDONED_SESSION_MS).length;$('#notificationDot').style.display=count?'block':'none';$('#notificationButton').title=count?`${count} sesión(es) posiblemente abandonada(s)`:'Sin alertas'}
function runWhenIdle(task,timeout=1400){
 if('requestIdleCallback' in window)return window.requestIdleCallback(()=>task(),{timeout});
 return window.setTimeout(task,Math.min(timeout,350))
}
function initFirebaseDeferred(){
 runWhenIdle(()=>{
  initFirebase().catch(error=>{
   console.error('ETER Firebase deferred init failed',error);
   toast('La aplicación continúa en modo local','warn')
  })
 },1200)
}
function installPerformanceAuditLoop(){
 const report={longTasks:0,slowFrames:0,lastAudit:0};
 if('PerformanceObserver' in window){
  try{
   const observer=new PerformanceObserver(list=>{
    for(const entry of list.getEntries())if(entry.duration>=50)report.longTasks++
   });
   observer.observe({type:'longtask',buffered:true})
  }catch(_){ }
 }
 let last=performance.now(),frames=0;
 const sample=now=>{
  const delta=now-last;last=now;frames++;
  if(delta>48)report.slowFrames++;
  if(frames<180&&!document.hidden)requestAnimationFrame(sample)
 };
 requestAnimationFrame(sample);
 runWhenIdle(()=>{
  report.lastAudit=Date.now();
  window.ETER_PERFORMANCE_AUDIT={...report,domNodes:document.getElementsByTagName('*').length,patients:(data.patients||[]).length};
  console.info('[ETER] Auditoría de rendimiento',window.ETER_PERFORMANCE_AUDIT)
 },2600)
}
function handleVisibilityPerformance(){
 if(document.hidden){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null}
 }else{
  startTimerLoop();
  updateNotifications()
 }
}
async function init(){
 if(appInitialized)return;
 appInitialized=true;
 ensureRuntimeStyles();
 restoreSidebarPreference();
 navInit();
 renderCurrentView({preserveState:false});
 updateNotifications();
 startTimerLoop();
 attachListeners();
 document.addEventListener('visibilitychange',handleVisibilityPerformance,{passive:true});
 installPerformanceAuditLoop();
 initFirebaseDeferred()
}
init().catch(error=>{console.error('ETER init failed',error);toast('La aplicación inició en modo local','warn')});
</script>
