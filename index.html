<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ETER KinePro | Panel clínico</title>
<style>
:root{
  --blue:#185FA5;--blue-50:#EAF2FF;--green:#0F6E56;--green-50:#E6F4F1;--bg:#F7F9FC;--white:#FFFFFF;--text:#2C3440;--muted:#6B7785;--border:#DCE3EB;--amber:#F4A62A;--amber-50:#FEF6E7;--red:#D64545;--red-50:#FDEAEA;--radius:14px;--radius-sm:9px;--sidebar:260px;--font:Inter,Segoe UI,system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.app{min-height:100vh;display:flex;background:var(--bg)}
.sidebar{width:var(--sidebar);background:var(--white);border-right:1px solid var(--border);position:fixed;inset:0 auto 0 0;z-index:50;display:flex;flex-direction:column;transition:transform .22s ease}
.brand{padding:22px 20px;border-bottom:1px solid var(--border)}
.brand-title{font-size:20px;font-weight:800;letter-spacing:-.6px;color:var(--text)}
.brand-title span{color:var(--blue)}
.brand-sub{font-size:12px;color:var(--muted);margin-top:2px;font-weight:600}
.nav{padding:14px 10px;display:flex;flex-direction:column;gap:4px}
.nav-btn{width:100%;border:0;background:transparent;color:var(--muted);display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;font-size:14px;font-weight:650;text-align:left;border-left:3px solid transparent}
.nav-btn:hover{background:#F2F6FB;color:var(--text)}
.nav-btn.active{background:var(--blue-50);color:var(--blue);border-left-color:var(--blue)}
.nav-dot{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.7}
.sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
.content{margin-left:var(--sidebar);min-height:100vh;width:calc(100% - var(--sidebar));display:flex;flex-direction:column}
.header{height:68px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 24px;position:sticky;top:0;z-index:30}
.menu-btn{display:none;width:40px;height:40px;border:1px solid var(--border);background:var(--white);border-radius:10px;color:var(--text);align-items:center;justify-content:center;font-size:20px}
.header-title{font-size:20px;font-weight:800;letter-spacing:-.4px;min-width:160px}
.search{flex:1;max-width:440px;position:relative}.search input{width:100%;height:40px;border:1px solid var(--border);border-radius:10px;background:var(--bg);padding:0 14px;color:var(--text);outline:none}.search input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.12)}
.header-actions{margin-left:auto;display:flex;align-items:center;gap:12px}.profile{display:flex;flex-direction:column;line-height:1.2;font-size:12px;color:var(--muted);padding-left:12px;border-left:1px solid var(--border)}.profile strong{font-size:13px;color:var(--text)}
.main{padding:24px;max-width:1400px;width:100%;margin:0 auto}.view{display:none;animation:fade .18s ease}.view.active{display:block}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid{display:grid;gap:16px}.metrics{grid-template-columns:repeat(5,minmax(0,1fr));margin-bottom:18px}.two-col{grid-template-columns:1.2fr .8fr}.three-col{grid-template-columns:repeat(3,minmax(0,1fr))}.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px}.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}.card-title{font-size:15px;font-weight:800;color:var(--text)}.card-sub{font-size:12px;color:var(--muted);margin-top:2px}.metric{min-height:118px}.metric-label{font-size:12px;color:var(--muted);font-weight:700}.metric-value{font-size:30px;font-weight:850;letter-spacing:-1px;margin:6px 0 4px}.metric-note{font-size:12px;color:var(--muted)}
.badge{display:inline-flex;align-items:center;height:24px;border-radius:999px;padding:0 9px;font-size:11px;font-weight:750;border:1px solid transparent}.b-ok{background:var(--green-50);color:var(--green);border-color:#B9DED5}.b-warn{background:var(--amber-50);color:#925F00;border-color:#F5D39A}.b-blue{background:var(--blue-50);color:var(--blue);border-color:#BAD3F4}.b-red{background:var(--red-50);color:var(--red);border-color:#F0B9B9}.b-gray{background:#F2F5F8;color:var(--muted);border-color:var(--border)}
.btn{height:40px;border-radius:10px;border:1px solid var(--border);background:var(--white);color:var(--text);font-size:13px;font-weight:800;padding:0 14px;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn:hover{border-color:#BAC6D4}.btn-primary{background:var(--blue);border-color:var(--blue);color:var(--white)}.btn-success{background:var(--green);border-color:var(--green);color:var(--white)}.btn-block{width:100%}
.table{width:100%;border-collapse:collapse}.table th,.table td{text-align:left;padding:12px 10px;border-bottom:1px solid var(--border);font-size:13px}.table th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:850}.table tr:last-child td{border-bottom:0}.list{display:flex;flex-direction:column;gap:10px}.item{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--border);border-radius:12px;padding:12px;background:var(--white)}.item-main strong{display:block;font-size:14px}.item-main span{display:block;font-size:12px;color:var(--muted);margin-top:2px}.quick{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}.quick .btn{height:54px;white-space:normal;text-align:center}
.toolbar{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap}.input,.select,.textarea{height:40px;border:1px solid var(--border);border-radius:10px;background:var(--white);padding:0 12px;color:var(--text);outline:none}.textarea{height:auto;min-height:92px;padding:10px 12px;resize:vertical}.input:focus,.select:focus,.textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.12)}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.field label{display:block;font-size:12px;color:var(--text);font-weight:800;margin-bottom:6px}.field.full{grid-column:1/-1}.empty{border:1px dashed var(--border);border-radius:var(--radius);padding:28px;text-align:center;color:var(--muted);background:var(--white)}
.overlay{display:none;position:fixed;inset:0;background:rgba(44,52,64,.42);z-index:45}.overlay.open{display:block}.toast{position:fixed;right:20px;bottom:20px;background:var(--green);color:#fff;border-radius:12px;padding:12px 16px;font-size:13px;font-weight:800;opacity:0;transform:translateY(12px);transition:.22s;z-index:90}.toast.show{opacity:1;transform:none}
.anamnesis-shell{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}.wizard-head{padding:18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:12px;align-items:center}.steps{display:flex;gap:6px;overflow:auto;padding:12px 18px;border-bottom:1px solid var(--border)}.step-chip{border:1px solid var(--border);background:var(--white);border-radius:999px;padding:7px 11px;font-size:12px;font-weight:800;color:var(--muted);white-space:nowrap}.step-chip.active{background:var(--blue-50);color:var(--blue);border-color:#BAD3F4}.step-chip.done{background:var(--green-50);color:var(--green);border-color:#B9DED5}.wizard-body{padding:18px}.wizard-panel{display:none}.wizard-panel.active{display:block}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1px solid var(--border);background:#fff;border-radius:999px;padding:7px 12px;color:var(--text);font-size:13px;font-weight:700}.chip.active{background:var(--blue-50);border-color:var(--blue);color:var(--blue)}.eva-box{display:flex;align-items:center;gap:14px}.eva-value{font-size:42px;font-weight:900;color:var(--green);min-width:54px}.eva-value.amber{color:var(--amber)}.eva-value.red{color:var(--red)}input[type=range]{width:100%;accent-color:var(--blue)}.wizard-actions{display:flex;justify-content:space-between;padding:14px 18px;border-top:1px solid var(--border)}.summary-box{display:grid;gap:10px}.summary-row{border:1px solid var(--border);border-radius:10px;padding:10px}.summary-row small{display:block;text-transform:uppercase;font-size:10px;letter-spacing:.5px;color:var(--muted);font-weight:900}.summary-row span{font-size:13px;font-weight:650}.json-box{background:#202736;color:#CDE7FF;border-radius:12px;padding:14px;overflow:auto;font-family:Consolas,monospace;font-size:12px;max-height:260px;display:none;margin-top:12px}
@media(max-width:1100px){.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}.two-col,.three-col{grid-template-columns:1fr}.quick{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:760px){.sidebar{transform:translateX(-105%)}.sidebar.open{transform:none}.content{margin-left:0;width:100%}.menu-btn{display:flex}.header{padding:0 14px;height:62px}.header-title{font-size:17px;min-width:0}.search{display:none}.profile{display:none}.main{padding:16px}.metrics{grid-template-columns:1fr}.card{padding:15px}.item{align-items:flex-start;flex-direction:column}.table,.table tbody,.table tr,.table td{display:block;width:100%}.table thead{display:none}.table tr{border:1px solid var(--border);border-radius:12px;margin-bottom:10px;background:#fff;padding:8px}.table td{border:0;padding:6px 4px}.table td::before{content:attr(data-label);display:block;font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:900}.form-grid{grid-template-columns:1fr}.quick{grid-template-columns:1fr}.header-actions .btn-primary{display:none}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><div class="brand-title">ETER <span>KinePro</span></div><div class="brand-sub">Gestión clínica kinésica</div></div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-footer">Panel profesional para consultorio<br>Versión local sin backend</div>
  </aside>
  <div class="overlay" id="overlay"></div>
  <div class="content">
    <header class="header">
      <button class="menu-btn" id="menuBtn" aria-label="Abrir menú">☰</button>
      <h1 class="header-title" id="sectionTitle">Inicio</h1>
      <div class="search"><input id="globalSearch" type="search" placeholder="Buscar paciente, turno o evolución"></div>
      <div class="header-actions"><button class="btn btn-primary" data-goto="pacientes">Nuevo paciente</button><div class="profile"><strong>Lic. Profesional</strong><span>Kinesiología</span></div></div>
    </header>
    <main class="main">
      <section class="view active" id="view-inicio"></section>
      <section class="view" id="view-pacientes"></section>
      <section class="view" id="view-anamnesis"></section>
      <section class="view" id="view-turnos"></section>
      <section class="view" id="view-evoluciones"></section>
      <section class="view" id="view-rutinas"></section>
      <section class="view" id="view-pagos"></section>
      <section class="view" id="view-reportes"></section>
      <section class="view" id="view-configuracion"></section>
    </main>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const sections=[['inicio','Inicio'],['pacientes','Pacientes'],['anamnesis','Nueva anamnesis'],['turnos','Turnos'],['evoluciones','Evoluciones'],['rutinas','Rutinas'],['pagos','Pagos'],['reportes','Reportes'],['configuracion','Configuración']];
const patients=[['Martín Herrera','12/06/2026','Lumbalgia mecánica','Activo'],['Sofía Alarcón','11/06/2026','Cervicalgia','Activo'],['Pablo Méndez','10/06/2026','Tendinopatía rotuliana','En seguimiento'],['Carla Ruiz','07/06/2026','Postquirúrgico LCA','Activo'],['Nicolás Aguirre','05/06/2026','Dolor de hombro','Alta parcial']];
const turns=[['08:30','Martín Herrera','Control lumbar','Confirmado'],['10:00','Sofía Alarcón','Evaluación cervical','Pendiente'],['11:30','Carla Ruiz','Rehabilitación LCA','Confirmado'],['15:00','Pablo Méndez','Evolución rodilla','Finalizado']];
const evol=[['Martín Herrera','12/06/2026','5/10','Movilización lumbar','Mejora parcial del rango de movimiento.'],['Carla Ruiz','11/06/2026','3/10','Ejercicio terapéutico','Tolera carga progresiva sin aumento de dolor.'],['Sofía Alarcón','10/06/2026','6/10','Masoterapia','Persisten síntomas en trapecio superior.']];
const state={view:'inicio',wiz:1,max:1,record:{nombre:'',edad:'',telefono:'',ocupacion:'',obra:'',quir:'',trauma:'',enf:[],med:'',tabaco:'',act:[],freq:'',alim:'',postura:'',zonas:[],motivo:'',tiempo:'',irr:'',estudios:[],evaAct:0,evaRep:0,obs:'',plan:[],sesiones:''}};
function badge(s){let c=s==='Confirmado'||s==='Activo'||s==='Finalizado'?'b-ok':s==='Pendiente'||s==='En seguimiento'?'b-warn':'b-gray';return `<span class="badge ${c}">${s}</span>`}
function navInit(){document.getElementById('nav').innerHTML=sections.map(([id,t])=>`<button class="nav-btn ${id==='inicio'?'active':''}" data-view="${id}"><span class="nav-dot"></span>${t}</button>`).join('')}
function setView(id){state.view=id;document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+id).classList.add('active');document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===id));document.getElementById('sectionTitle').textContent=sections.find(s=>s[0]===id)[1];closeMenu();window.scrollTo(0,0)}
function renderInicio(){document.getElementById('view-inicio').innerHTML=`<div class="grid metrics">${[['Pacientes activos','42','8 en tratamiento','b-ok'],['Turnos de hoy','12','4 restantes','b-blue'],['Fichas incompletas','3','Requieren revisión','b-warn'],['Evoluciones pendientes','6','Actualizar hoy','b-red'],['Ingresos del mes','$840.000','Registro simulado','b-ok']].map(m=>`<article class="card metric"><div class="metric-label">${m[0]}</div><div class="metric-value">${m[1]}</div><div class="metric-note">${m[2]}</div><span class="badge ${m[3]}">Estado</span></article>`).join('')}</div><div class="grid two-col"><section class="card"><div class="card-head"><div><h2 class="card-title">Agenda del día</h2><p class="card-sub">Turnos programados</p></div><button class="btn" data-goto="turnos">Ver agenda</button></div>${turnosList()}</section><section class="card"><div class="card-head"><div><h2 class="card-title">Accesos rápidos</h2><p class="card-sub">Acciones frecuentes</p></div></div><div class="quick"><button class="btn btn-primary" data-goto="anamnesis">Crear anamnesis</button><button class="btn" data-goto="evoluciones">Registrar evolución</button><button class="btn" data-goto="rutinas">Crear rutina</button><button class="btn" data-goto="turnos">Agendar turno</button><button class="btn" data-goto="pagos">Cargar pago</button></div></section></div><section class="card" style="margin-top:16px"><div class="card-head"><div><h2 class="card-title">Pacientes recientes</h2><p class="card-sub">Últimas consultas registradas</p></div><button class="btn" data-goto="pacientes">Ver todos</button></div>${patientsTable()}</section>`}
function patientsTable(){return `<table class="table"><thead><tr><th>Nombre</th><th>Última consulta</th><th>Diagnóstico</th><th>Estado</th><th>Acción</th></tr></thead><tbody>${patients.map(p=>`<tr><td data-label="Nombre">${p[0]}</td><td data-label="Última consulta">${p[1]}</td><td data-label="Diagnóstico">${p[2]}</td><td data-label="Estado">${badge(p[3])}</td><td data-label="Acción"><button class="btn">Ver ficha</button></td></tr>`).join('')}</tbody></table>`}
function turnosList(){return `<div class="list">${turns.map(t=>`<div class="item"><div class="item-main"><strong>${t[0]} - ${t[1]}</strong><span>${t[2]}</span></div>${badge(t[3])}</div>`).join('')}</div>`}
function renderPacientes(){document.getElementById('view-pacientes').innerHTML=`<section class="card"><div class="card-head"><div><h2 class="card-title">Gestión de pacientes</h2><p class="card-sub">Listado funcional simulado</p></div><button class="btn btn-primary" data-goto="anamnesis">Nuevo paciente</button></div><div class="toolbar"><input class="input" id="patientSearch" placeholder="Buscar paciente"><select class="select"><option>Todos los estados</option><option>Activo</option><option>En seguimiento</option><option>Alta parcial</option></select></div>${patientsTable()}</section>`}
function renderSimple(id,title,sub,body){document.getElementById('view-'+id).innerHTML=`<section class="card"><div class="card-head"><div><h2 class="card-title">${title}</h2><p class="card-sub">${sub}</p></div></div>${body}</section>`}
function renderAll(){renderInicio();renderPacientes();renderAnamnesis();renderSimple('turnos','Agenda de turnos','Calendario clínico simple',`<div class="toolbar"><input class="input" type="date"><button class="btn btn-primary">Agendar turno</button></div>${turnosList()}`);renderSimple('evoluciones','Evoluciones clínicas','Historial de intervenciones',`<div class="grid three-col">${evol.map(e=>`<article class="card"><div class="card-title">${e[0]}</div><p class="card-sub">${e[1]}</p><p><strong>Dolor EVA:</strong> ${e[2]}</p><p><strong>Tratamiento:</strong> ${e[3]}</p><p class="card-sub">${e[4]}</p></article>`).join('')}</div><br><button class="btn btn-primary">Registrar evolución</button>`);renderSimple('rutinas','Rutinas asignadas','Planificación de ejercicios',`<div class="list">${[['Martín Herrera','Core y movilidad lumbar','6 ejercicios','Activo'],['Carla Ruiz','Fuerza progresiva de rodilla','8 ejercicios','Activo'],['Sofía Alarcón','Movilidad cervical','5 ejercicios','Pendiente']].map(r=>`<div class="item"><div class="item-main"><strong>${r[0]}</strong><span>${r[1]} - ${r[2]}</span></div>${badge(r[3])}</div>`).join('')}</div><br><button class="btn btn-primary">Crear rutina</button>`);renderSimple('pagos','Pagos','Control financiero simple',`<div class="grid three-col"><article class="card"><div class="metric-label">Ingresos del mes</div><div class="metric-value">$840.000</div></article><article class="card"><div class="metric-label">Pagos pendientes</div><div class="metric-value">$95.000</div></article><article class="card"><div class="metric-label">Últimos pagos</div><div class="metric-value">18</div></article></div><br><button class="btn btn-primary">Registrar pago</button>`);renderSimple('reportes','Reportes','Indicadores clínicos y financieros',`<div class="grid three-col"><article class="card"><div class="metric-label">Pacientes atendidos</div><div class="metric-value">126</div></article><article class="card"><div class="metric-label">Tratamiento frecuente</div><div class="metric-value">Masoterapia</div></article><article class="card"><div class="metric-label">Sesiones promedio</div><div class="metric-value">4.8</div></article></div>`);renderSimple('configuracion','Configuración','Preferencias del consultorio',`<div class="form-grid"><div class="field"><label>Profesional</label><input class="input" value="Lic. Profesional"></div><div class="field"><label>Especialidad</label><input class="input" value="Kinesiología"></div><div class="field"><label>Duración de sesión</label><select class="select"><option>45 minutos</option><option>60 minutos</option></select></div><div class="field"><label>Horario base</label><input class="input" value="08:00 a 18:00"></div></div><br><button class="btn btn-success">Guardar cambios</button>`)}
function renderAnamnesis(){document.getElementById('view-anamnesis').innerHTML=`<div class="anamnesis-shell"><div class="wizard-head"><div><h2 class="card-title">Nueva ficha de anamnesis</h2><p class="card-sub">Formulario clínico en 6 pasos integrado al panel principal</p></div><span class="badge b-blue">Paso <span id="wizNum">1</span> de 6</span></div><div class="steps" id="steps"></div><div class="wizard-body" id="wizardBody"></div><div class="wizard-actions"><button class="btn" id="prevWiz">Anterior</button><button class="btn btn-primary" id="nextWiz">Continuar</button><button class="btn btn-success" id="saveWiz" style="display:none">Guardar ficha</button></div></div>`;renderWizard()}
function input(id,label,type='text'){return `<div class="field"><label>${label}</label><input class="input" id="${id}" type="${type}" value="${state.record[id]||''}"></div>`}
function area(id,label){return `<div class="field full"><label>${label}</label><textarea class="textarea" id="${id}">${state.record[id]||''}</textarea></div>`}
function chipGroup(key,vals,radio=false){return `<div class="chips" data-key="${key}" data-radio="${radio}">${vals.map(v=>`<button class="chip ${state.record[key].includes?state.record[key].includes(v)?'active':'':state.record[key]===v?'active':''}" data-val="${v}">${v}</button>`).join('')}</div>`}
function renderWizard(){const names=['Datos personales','Antecedentes','Hábitos','Motivo','Evaluación','Resumen'];document.getElementById('wizNum').textContent=state.wiz;document.getElementById('steps').innerHTML=names.map((n,i)=>`<button class="step-chip ${state.wiz===i+1?'active':i+1<state.wiz?'done':''}">${i+1<state.wiz?'✓ ':''}${n}</button>`).join('');let html='';if(state.wiz===1)html=`<div class="form-grid">${input('nombre','Nombre completo')}${input('edad','Edad','number')}${input('telefono','Teléfono')}${input('ocupacion','Ocupación')}${input('obra','Obra social / prepaga')}</div>`;if(state.wiz===2)html=`<div class="form-grid">${area('quir','Antecedentes quirúrgicos')}${area('trauma','Antecedentes traumatológicos / patológicos')}<div class="field full"><label>Enfermedades crónicas</label>${chipGroup('enf',['Diabetes','HTA','Osteoporosis','Fibromialgia','Embarazo','Artritis','Artrosis','Otra'])}</div>${area('med','Medicación actual')}</div>`;if(state.wiz===3)html=`<div class="form-grid"><div class="field full"><label>Tabaquismo</label>${chipGroup('tabaco',['No fumador','Ex fumador','Fumador activo'],true)}</div><div class="field full"><label>Actividad física</label>${chipGroup('act',['Gym','Ciclismo','Pádel','Tenis','Fútbol','Natación','Yoga/Pilates','Golf','Básquet','Remo','Sedentario','Otra'])}</div><div class="field"><label>Frecuencia semanal</label>${chipGroup('freq',['1x','2x','3x','4-5x','Todos los días','No hace actividad'],true)}</div><div class="field"><label>Alimentación</label>${chipGroup('alim',['Muy buena','Buena','Regular','Mala','Muy mala'],true)}</div><div class="field full"><label>Horas en posición estática</label>${chipGroup('postura',['Menos de 4h','4-6h','6-8h','Más de 8h'],true)}</div></div>`;if(state.wiz===4)html=`<div class="form-grid"><div class="field full"><label>Zonas afectadas</label>${chipGroup('zonas',['Cervical','Dorsal','Lumbar','Glúteo/cadera','MS','MI','Hombro','Codo/antebrazo','Muñeca/mano','Rodilla','Tobillo/pie','Preventivo/descarga'])}</div>${area('motivo','Motivo principal')}<div class="field full"><label>Tiempo del problema</label>${chipGroup('tiempo',['Agudo','Subagudo','Crónico','Recurrente'],true)}</div><div class="field full"><label>Irradiación</label>${chipGroup('irr',['No','Sí al brazo','Sí a la pierna','Sí otra zona'],true)}</div><div class="field full"><label>Estudios disponibles</label>${chipGroup('estudios',['Rx','RMN','Ecografía','TAC','Sin estudios'])}</div></div>`;if(state.wiz===5)html=`<div class="form-grid"><div class="field full"><label>EVA en actividad</label><div class="eva-box"><strong class="eva-value" id="evaA">${state.record.evaAct}</strong><input type="range" min="0" max="10" value="${state.record.evaAct}" id="evaAct"></div></div><div class="field full"><label>EVA en reposo</label><div class="eva-box"><strong class="eva-value" id="evaR">${state.record.evaRep}</strong><input type="range" min="0" max="10" value="${state.record.evaRep}" id="evaRep"></div></div>${area('obs','Observaciones clínicas')}<div class="field full"><label>Plan de tratamiento</label>${chipGroup('plan',['Masoterapia','Punción seca','Electroterapia','Ejercicio terapéutico','Vendaje neuromuscular','Tracción/movilización','Cupping/ventosas','Reeducación postural'])}</div><div class="field full"><label>Frecuencia de sesiones</label>${chipGroup('sesiones',['1x/semana','2x/semana','3x/semana','Cada 15 días','A demanda'],true)}</div></div>`;if(state.wiz===6){html=`<div class="summary-box">${Object.entries(state.record).map(([k,v])=>`<div class="summary-row"><small>${k}</small><span>${Array.isArray(v)?(v.join(', ')||'No registrado'):(v||'No registrado')}</span></div>`).join('')}</div><pre class="json-box" id="jsonBox"></pre>`}document.getElementById('wizardBody').innerHTML=html;document.getElementById('prevWiz').style.visibility=state.wiz===1?'hidden':'visible';document.getElementById('nextWiz').style.display=state.wiz===6?'none':'inline-flex';document.getElementById('saveWiz').style.display=state.wiz===6?'inline-flex':'none';bindWizard()}
function collectWizard(){document.querySelectorAll('#wizardBody input:not([type=range]),#wizardBody textarea').forEach(el=>state.record[el.id]=el.value.trim());let a=document.getElementById('evaAct'),r=document.getElementById('evaRep');if(a)state.record.evaAct=+a.value;if(r)state.record.evaRep=+r.value}
function bindWizard(){document.querySelectorAll('.chips').forEach(g=>g.onclick=e=>{let b=e.target.closest('.chip');if(!b)return;let key=g.dataset.key,radio=g.dataset.radio==='true';if(radio){g.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));b.classList.add('active');state.record[key]=b.dataset.val}else{b.classList.toggle('active');state.record[key]=[...g.querySelectorAll('.chip.active')].map(x=>x.dataset.val)}});['evaAct','evaRep'].forEach(id=>{let el=document.getElementById(id);if(el)el.oninput=()=>{let target=id==='evaAct'?'evaA':'evaR';let n=document.getElementById(target);n.textContent=el.value;n.className='eva-value '+(+el.value>6?'red':+el.value>3?'amber':'')}});document.getElementById('prevWiz').onclick=()=>{collectWizard();state.wiz--;renderWizard()};document.getElementById('nextWiz').onclick=()=>{collectWizard();if(state.wiz===1&&!state.record.nombre){toast('El nombre completo es obligatorio');return}state.wiz++;renderWizard()};document.getElementById('saveWiz').onclick=()=>{collectWizard();let box=document.getElementById('jsonBox');box.style.display='block';box.textContent=JSON.stringify({sistema:'ETER KinePro',fecha:new Date().toLocaleString('es-AR'),ficha:state.record},null,2);toast('Ficha guardada correctamente')}}
function openMenu(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('open')}function closeMenu(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('open')}function toast(t){let el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2400)}
document.addEventListener('click',e=>{let nav=e.target.closest('[data-view]');if(nav)setView(nav.dataset.view);let go=e.target.closest('[data-goto]');if(go)setView(go.dataset.goto)});document.getElementById('menuBtn').onclick=openMenu;document.getElementById('overlay').onclick=closeMenu;document.getElementById('globalSearch').oninput=e=>{if(e.target.value.trim().length>1)toast('Búsqueda simulada: '+e.target.value.trim())};navInit();renderAll();
</script>
</body>
</html>
